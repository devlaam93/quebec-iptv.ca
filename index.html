<!doctype html>
<html lang="fr-CA" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quebec IPTV - Meilleur Service IPTV au Quebec | +45,000 Chaines</title>
    <meta name="description" content="Service IPTV premium au Quebec avec +45,000 chaines TV, films et series en 4K/HD. Essai gratuit 24h. Support 24/7. Compatible tous appareils." />
    <meta name="author" content="Quebec IPTV" />
    <meta name="keywords" content="iptv quebec, iptv canada, service iptv, chaines tv, streaming tv, iptv montreal, abonnement iptv" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="French" />
    <meta name="geo.region" content="CA-QC" />
    <meta name="geo.placename" content="Quebec" />
    <link rel="canonical" href="https://quebec-iptv.ca/" />
    <link rel="author" href="/humans.txt" type="text/plain" />

    <!-- Preconnect to critical origins (reduces DNS/TCP/TLS latency) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://quebec-iptv.b-cdn.net" crossorigin />
    
    <!-- Preload critical CSS to reduce render-blocking -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" />
    
    <!-- Google Fonts with font-display: swap to prevent FOIT -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" media="print" onload="this.media='all'" />
    
    <!-- DNS Prefetch for additional resources -->
    <link rel="dns-prefetch" href="https://quebec-iptv.b-cdn.net" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Preload critical above-the-fold assets for LCP optimization -->
    <!-- Note: These paths will work in production when assets are served from the CDN origin -->
    <link rel="preload" as="image" href="/assets/hero-background.jpg" type="image/jpeg" fetchpriority="high" />
    <link rel="preload" as="image" href="/assets/iptv-quebec-animated-logo.png" type="image/png" fetchpriority="high" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://quebec-iptv.ca/" />
    <meta property="og:title" content="Quebec IPTV - Meilleur Service IPTV au Quebec | +45,000 Chaines" />
    <meta property="og:description" content="Service IPTV premium au Quebec avec +45,000 chaines TV, films et series en 4K/HD. Essai gratuit 24h. Support 24/7." />
    <meta property="og:image" content="https://quebec-iptv.ca/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="fr_CA" />
    <meta property="og:site_name" content="Quebec IPTV" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@QuebecIPTV" />
    <meta name="twitter:creator" content="@QuebecIPTV" />
    <meta name="twitter:url" content="https://quebec-iptv.ca/" />
    <meta name="twitter:title" content="Quebec IPTV - Meilleur Service IPTV au Quebec" />
    <meta name="twitter:description" content="Service IPTV premium au Quebec avec +45,000 chaines TV, films et series en 4K/HD." />
    <meta name="twitter:image" content="https://quebec-iptv.ca/og-image.jpg" />
    <meta name="twitter:image:alt" content="Quebec IPTV - Service IPTV Premium" />

    <!-- Performance hints -->
    <meta http-equiv="x-dns-prefetch-control" content="on" />

    <!-- Critical CSS: Inlined for faster First Contentful Paint -->
    <style>
      /* Critical CSS variables */
      :root {
        --background: 0 0% 100%;
        --foreground: 220 15% 12%;
        --primary: 16 100% 42%;
        --primary-foreground: 0 0% 100%;
        --card: 0 0% 98%;
        --muted: 220 13% 92%;
        --border: 220 13% 80%;
        --radius: 0.75rem;
      }
      .dark {
        --background: 220 15% 6%;
        --foreground: 210 40% 96%;
        --primary: 16 100% 58%;
        --primary-foreground: 220 15% 6%;
        --card: 220 15% 9%;
        --muted: 220 13% 14%;
        --border: 220 13% 22%;
      }
      /* Critical base styles */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { overflow-x: hidden; -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
      }
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        font-weight: 600;
        letter-spacing: -0.025em;
      }
      /* Critical header styles */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background-color: hsl(var(--background) / 0.95);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid hsl(var(--border));
      }
      /* Critical hero placeholder */
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      /* Prevent FOUC */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
