    <!-- Critical inline CSS for above-the-fold content (eliminates render-blocking) -->
    <style>
      /* CSS Variables - minimal set for initial render */
      :root {
        --background: 0 0% 100%;
        --foreground: 220 15% 12%;
        --primary: 16 100% 42%;
        --primary-foreground: 0 0% 100%;
        --card: 0 0% 98%;
        --muted: 220 13% 92%;
        --muted-foreground: 220 12% 35%;
        --border: 220 13% 80%;
        --radius: 0.75rem;
        --gradient-orange: linear-gradient(135deg, hsl(16, 100%, 42%) 0%, hsl(20, 100%, 38%) 100%);
      }
      .dark {
        --background: 220 15% 6%;
        --foreground: 210 40% 96%;
        --primary: 16 100% 58%;
        --primary-foreground: 220 15% 6%;
        --card: 220 15% 9%;
        --muted: 220 13% 14%;
        --muted-foreground: 215 15% 68%;
        --border: 220 13% 22%;
        --gradient-orange: linear-gradient(135deg, hsl(16, 100%, 58%) 0%, hsl(20, 100%, 52%) 100%);
      }
      /* Critical base resets */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { overflow-x: hidden; -webkit-text-size-adjust: 100%; }
      body {
        font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        line-height: 1.5;
      }
      /* Typography */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        font-weight: 700;
        letter-spacing: -0.025em;
        line-height: 1.2;
      }
      /* Critical header layout */
      header {
        position: sticky;
        top: 0;
        z-index: 50;
        background-color: hsl(var(--background) / 0.95);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid hsl(var(--border));
      }
      /* Container utility */
      .container {
        width: 100%;
        max-width: 1280px;
        margin-left: auto;
        margin-right: auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      @media (min-width: 640px) { .container { padding-left: 1.5rem; padding-right: 1.5rem; } }
      /* Critical button styles */
      button, [role="button"] {
        cursor: pointer;
        font-family: inherit;
        border: none;
        background: none;
      }
      /* Primary button */
      .btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.625rem 1.25rem;
        font-size: 0.875rem;
        font-weight: 500;
        border-radius: var(--radius);
        background: var(--gradient-orange);
        color: hsl(var(--primary-foreground));
        transition: transform 0.2s, box-shadow 0.2s;
      }
      .btn-primary:hover { transform: translateY(-1px); }
      /* Flex utilities */
      .flex { display: flex; }
      .items-center { align-items: center; }
      .justify-between { justify-content: space-between; }
      .gap-2 { gap: 0.5rem; }
      .gap-3 { gap: 0.75rem; }
      /* App root */
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      /* Screen reader only */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      /* Prevent FOUC for images */
      img { max-width: 100%; height: auto; }
      /* Hero section critical styles */
      .hero-section {
        position: relative;
        min-height: 80vh;
        display: flex;
        align-items: center;
      }
    </style>
